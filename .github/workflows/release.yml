name: Release
permissions:
  contents: write

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

env:
  BIN_NAME: knightwatch
  REPO_TAP: YofaGh/homebrew-tap

jobs:
  # ---------------------------------------------------------------------
  # Resolve the tag/version once so every other job can reuse it.
  # ---------------------------------------------------------------------
  prep:
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ github.ref_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------
  # Build the default-feature binary for every platform, package it into
  # an archive, and hash it. Each job uploads its own artifact.
  # ---------------------------------------------------------------------
  build:
    needs: prep
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libpipewire-0.3-dev \
            libegl-dev \
            libgbm-dev

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          stage="${BIN_NAME}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "$stage/"
          cp LICENSE README.md "$stage/" 2>/dev/null || true
          tar -czf "${stage}.tar.gz" "$stage"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          else
            shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          fi

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "${env:BIN_NAME}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${env:BIN_NAME}.exe" $stage
          if (Test-Path LICENSE) { Copy-Item LICENSE $stage }
          if (Test-Path README.md) { Copy-Item README.md $stage }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          $hash = Get-FileHash "$stage.zip" -Algorithm SHA256
          "$($hash.Hash.ToLower())  $stage.zip" | Out-File -Encoding ascii "$stage.zip.sha256"

      # --- MSI, Windows only ---------------------------------------------
      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.*
          wix extension add -g WixToolset.UI.wixext

      - name: Install cargo-wix
        if: runner.os == 'Windows'
        run: cargo install cargo-wix --locked

      - name: Build MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo wix --target ${{ matrix.target }} --nocapture -o "target\wix\${env:BIN_NAME}-${{ matrix.target }}.msi"
          Copy-Item "target\wix\${env:BIN_NAME}-${{ matrix.target }}.msi" "."
          $hash = Get-FileHash "${env:BIN_NAME}-${{ matrix.target }}.msi" -Algorithm SHA256
          "$($hash.Hash.ToLower())  ${env:BIN_NAME}-${{ matrix.target }}.msi" | Out-File -Encoding ascii "${env:BIN_NAME}-${{ matrix.target }}.msi.sha256"

      - name: Upload artifact (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz
            ${{ env.BIN_NAME }}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.target }}.zip
            ${{ env.BIN_NAME }}-${{ matrix.target }}.zip.sha256
            ${{ env.BIN_NAME }}-${{ matrix.target }}.msi
            ${{ env.BIN_NAME }}-${{ matrix.target }}.msi.sha256

  build-x86_64-linux-headless:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build headless binary
        run: cargo build --release --locked --no-default-features
      - name: Package
        run: |
          cp target/release/${BIN_NAME} target/release/${BIN_NAME}-headless
          tar -czf ${BIN_NAME}-headless-x86_64-unknown-linux.tar.gz \
            -C target/release ${BIN_NAME}-headless \
            -C "$GITHUB_WORKSPACE" LICENSE README.md
          sha256sum ${BIN_NAME}-headless-x86_64-unknown-linux.tar.gz > ${BIN_NAME}-headless-x86_64-unknown-linux.tar.gz.sha256
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-headless-x86_64
          path: |
            ${{ env.BIN_NAME }}-headless-x86_64-unknown-linux.tar.gz
            ${{ env.BIN_NAME }}-headless-x86_64-unknown-linux.tar.gz.sha256

  build-aarch64-linux-headless:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install cross deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build headless binary
        run: cargo build --release --locked --no-default-features --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package
        run: |
          cp target/aarch64-unknown-linux-gnu/release/${BIN_NAME} target/aarch64-unknown-linux-gnu/release/${BIN_NAME}-headless
          tar -czf ${BIN_NAME}-headless-aarch64-unknown-linux.tar.gz \
            -C target/aarch64-unknown-linux-gnu/release ${BIN_NAME}-headless \
            -C "$GITHUB_WORKSPACE" LICENSE README.md
          sha256sum ${BIN_NAME}-headless-aarch64-unknown-linux.tar.gz > ${BIN_NAME}-headless-aarch64-unknown-linux.tar.gz.sha256
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-headless-aarch64
          path: |
            ${{ env.BIN_NAME }}-headless-aarch64-unknown-linux.tar.gz
            ${{ env.BIN_NAME }}-headless-aarch64-unknown-linux.tar.gz.sha256

  # ---------------------------------------------------------------------
  # Create the GitHub release and upload every built artifact + the
  # static installer scripts to it, all in one shot.
  # ---------------------------------------------------------------------
  create-release:
    needs: [prep, build, build-x86_64-linux-headless, build-aarch64-linux-headless]
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS.txt

      - name: Stage installer scripts
        run: |
          mkdir -p dist
          cp scripts/install.sh dist/install.sh
          cp scripts/install.ps1 dist/install.ps1

      - name: Create GitHub Release
        run: |
          gh release create "${{ needs.prep.outputs.tag }}" \
            --title "${{ env.BIN_NAME }} ${{ needs.prep.outputs.version }}" \
            --generate-notes \
            $(find dist -maxdepth 1 -type f)

  publish-homebrew:
    needs: [prep, build, create-release]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: dist
          merge-multiple: true

      - name: Read checksums
        id: sha
        run: |
          for f in dist/*.tar.gz.sha256; do
            target=$(basename "$f" .tar.gz.sha256)
            target=${target#${BIN_NAME}-}
            hash=$(cut -d' ' -f1 "$f")
            echo "${target}=${hash}" >> "$GITHUB_OUTPUT"
          done

      - name: Render formula
        run: |
          sed \
            -e "s/__VERSION__/${{ needs.prep.outputs.version }}/g" \
            -e "s/__TAG__/${{ needs.prep.outputs.tag }}/g" \
            -e "s/__SHA_DARWIN_ARM64__/${{ steps.sha.outputs.aarch64-apple-darwin }}/g" \
            -e "s/__SHA_DARWIN_X86_64__/${{ steps.sha.outputs.x86_64-apple-darwin }}/g" \
            -e "s/__SHA_LINUX_ARM64__/${{ steps.sha.outputs.aarch64-unknown-linux-gnu }}/g" \
            -e "s/__SHA_LINUX_X86_64__/${{ steps.sha.outputs.x86_64-unknown-linux-gnu }}/g" \
            homebrew/knightwatch.rb.template > knightwatch.rb

      - name: Push formula to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REPO_TAP}.git" tap
          mkdir -p tap/Formula
          cp knightwatch.rb tap/Formula/knightwatch.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/knightwatch.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit"
          else
            git commit -m "knightwatch ${{ needs.prep.outputs.version }}"
            git push
          fi