<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knight Watch</title>
    <link rel="stylesheet" href="/main.css" />
  </head>
  <body>
    <!-- ── Always-visible top bar ─────────────────────────── -->
    <header id="topbar">
      <div class="topbar-brand">
        <span class="brand-dot"></span>
        <h1>Knight Watch</h1>
        <span id="status">Loading…</span>
      </div>

      <nav id="tabnav" role="tablist" aria-label="Sections">
        <button class="tab" role="tab" data-tab="screens" aria-selected="true">
          <span class="tab-icon" aria-hidden="true">▦</span>
          <span class="tab-label">Screenshots</span>
        </button>
        <button class="tab" role="tab" data-tab="system" aria-selected="false">
          <span class="tab-icon" aria-hidden="true">◉</span>
          <span class="tab-label">System</span>
        </button>
        <button class="tab" role="tab" data-tab="processes" aria-selected="false">
          <span class="tab-icon" aria-hidden="true">≡</span>
          <span class="tab-label">Processes</span>
        </button>
        <span class="tab-indicator" aria-hidden="true"></span>
      </nav>

      <div class="topbar-actions">
        <span id="telegram-indicator" style="display: none"></span>
        <button id="shutdown-btn" title="Shut down the server">
          <span class="sd-dot"></span> Shutdown
        </button>
      </div>
    </header>

    <!-- ── Pane container ─────────────────────────────────── -->
    <div id="panes">
      <!-- Screenshots pane ──────────────────────────────── -->
      <section class="pane active" id="pane-screens" role="tabpanel">
        <main id="screens-pane">
          <div class="pane-header">
            <h2>Monitored Screens</h2>
          </div>
          <div id="screens"></div>
        </main>
      </section>

      <!-- System pane ───────────────────────────────────── -->
      <section class="pane" id="pane-system" role="tabpanel">
        <div class="pane-header">
          <h2>System</h2>
        </div>
        <div id="system-panel">
          <div id="system-panel-inner">
            <div class="sys-section" id="sys-host-section">
              <div class="sys-section-title">Host</div>
              <div id="sys-host-grid" class="sys-grid"></div>
            </div>
            <div class="sys-section" id="sys-cpu-section">
              <div class="sys-section-title">CPU</div>
              <div id="sys-cpu-grid" class="sys-grid"></div>
              <div id="sys-cpu-cores" class="sys-cores-row"></div>
            </div>
            <div class="sys-section" id="sys-mem-section">
              <div class="sys-section-title">Memory</div>
              <div id="sys-mem-grid" class="sys-grid"></div>
            </div>
            <div class="sys-section" id="sys-disk-section">
              <div class="sys-section-title">Disks</div>
              <div id="sys-disk-list"></div>
            </div>
            <div class="sys-section" id="sys-net-section">
              <div class="sys-section-title">Network</div>
              <div id="sys-net-list"></div>
            </div>
            <div class="sys-section" id="sys-gpu-section" style="display: none">
              <div class="sys-section-title">GPU</div>
              <div id="sys-gpu-list"></div>
            </div>
            <div class="sys-section" id="sys-battery-section" style="display: none">
              <div class="sys-section-title">Battery</div>
              <div id="sys-battery-grid" class="sys-grid"></div>
            </div>
            <div class="sys-section" id="sys-thermal-section" style="display: none">
              <div class="sys-section-title">Thermals</div>
              <div id="sys-thermal-list" class="sys-thermal-chips"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Processes pane ────────────────────────────────── -->
      <section class="pane" id="pane-processes" role="tabpanel">
        <aside id="process-pane">
          <div class="pane-header">
            <h2>Processes</h2>
          </div>
          <div id="process-content">
            <div id="work-banner">✔ Work complete — all children exited</div>

            <div class="process-columns">
              <div class="process-column">
                <div class="section-header">Tracked</div>
                <div id="root-section">
                  <div class="muted">No process tracker running.</div>
                </div>
              </div>

              <div class="process-column" id="top-processes-section">
                <div class="section-header">
                  Top Processes
                  <div class="top-controls">
                    <select id="top-sort-select" class="control-input">
                      <option value="cpu">CPU</option>
                      <option value="mem">MEM</option>
                    </select>
                    <input
                      type="number"
                      id="top-limit-input"
                      value="5"
                      min="1"
                      max="50"
                      class="control-input"
                      style="width: 3rem"
                    />
                  </div>
                </div>
                <div id="top-processes-list"></div>
              </div>
            </div>
          </div>
        </aside>
      </section>
    </div>

    <script src="/main.js" defer></script>
  </body>
</html>
