<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knight Watch</title>
    <link rel="stylesheet" href="/view.css" />
  </head>
  <body>
    <div class="app-layout">
      <main id="screens-pane">
        <header>
          <h2>Monitored Screens</h2>
        </header>
        <div id="screens"></div>
        <div id="system-panel">
          <div id="system-panel-inner">
            <div class="sys-section" id="sys-host-section">
              <div class="sys-section-title">Host</div>
              <div id="sys-host-grid" class="sys-grid"></div>
            </div>
            <div class="sys-section" id="sys-cpu-section">
              <div class="sys-section-title">CPU</div>
              <div id="sys-cpu-grid" class="sys-grid"></div>
              <div id="sys-cpu-cores" class="sys-cores-row"></div>
            </div>
            <div class="sys-section" id="sys-mem-section">
              <div class="sys-section-title">Memory</div>
              <div id="sys-mem-grid" class="sys-grid"></div>
            </div>
            <div class="sys-section" id="sys-disk-section">
              <div class="sys-section-title">Disks</div>
              <div id="sys-disk-list"></div>
            </div>
            <div class="sys-section" id="sys-net-section">
              <div class="sys-section-title">Network</div>
              <div id="sys-net-list"></div>
            </div>
            <div class="sys-section" id="sys-gpu-section" style="display: none">
              <div class="sys-section-title">GPU</div>
              <div id="sys-gpu-list"></div>
            </div>
            <div
              class="sys-section"
              id="sys-battery-section"
              style="display: none"
            >
              <div class="sys-section-title">Battery</div>
              <div id="sys-battery-grid" class="sys-grid"></div>
            </div>
            <div
              class="sys-section"
              id="sys-thermal-section"
              style="display: none"
            >
              <div class="sys-section-title">Thermals</div>
              <div id="sys-thermal-list" class="sys-thermal-chips"></div>
            </div>
          </div>
        </div>
      </main>

      <aside id="process-pane">
        <div class="brand">
          <h1>Knight Watch</h1>
          <span id="status">Loading…</span>
          <span id="telegram-indicator" style="display: none"></span>
          <button id="shutdown-btn" title="Shut down the server">
            ● Shutdown
          </button>
        </div>

        <div id="process-content">
          <div id="work-banner">✔ Work complete — all children exited</div>

          <div id="root-section">
            <div class="muted">No process tracker running.</div>
          </div>

          <div id="top-processes-section">
            <div class="section-header">
              Top Processes
              <div class="top-controls">
                <select id="top-sort-select" class="control-input">
                  <option value="cpu">CPU</option>
                  <option value="mem">MEM</option>
                </select>
                <input
                  type="number"
                  id="top-limit-input"
                  value="5"
                  min="1"
                  max="50"
                  class="control-input"
                  style="width: 3rem"
                />
              </div>
            </div>
            <div id="top-processes-list"></div>
          </div>
        </div>
      </aside>
    </div>

    <script src="/view.js" defer></script>
  </body>
</html>
