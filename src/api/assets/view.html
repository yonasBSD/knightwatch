<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knight Watch</title>
    <link rel="stylesheet" href="/view.css" />
  </head>
  <body>
    <header>
      <h1>Knight Watch</h1>
      <span id="status">Loading…</span>
      <span id="telegram-indicator" style="display:none"></span>
      <button id="shutdown-btn" title="Shut down the server">● Shutdown</button>
    </header>

    <main>
      <div id="screens-pane">
        <div id="screens"></div>
      </div>

      <aside id="process-pane">
        <h2>Process Monitor</h2>
        <div id="process-content">
          <div id="work-banner">✔ Work complete — all children exited</div>

          <div id="root-section">
            <div class="muted">No process tracker running.</div>
          </div>

          <div id="top-processes-section">
            <div class="section-header">
              Top Processes
              <div class="top-controls">
                <select id="top-sort-select" class="control-input">
                  <option value="cpu">CPU</option>
                  <option value="mem">MEM</option>
                </select>
                <input
                  type="number"
                  id="top-limit-input"
                  value="5"
                  min="1"
                  max="50"
                  class="control-input"
                  style="width: 3rem"
                />
              </div>
            </div>
            <div id="top-processes-list"></div>
          </div>
        </div>
      </aside>
    </main>

    <script src="/view.js" defer></script>
  </body>
</html>
